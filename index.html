<div>
  <h2>料金シミュレーター</h2>

  <div id="simulators"></div>

  <br>
  <button class="btn-add" onclick="addSim()">＋工事追加</button>
  <button class="btn-calc" onclick="calc()">計算</button>
  <button class="btn-reset" onclick="resetAll()">リセット</button>

  <h3 id="result"></h3>
  <div id="detail"></div>

  <p style="color:red; font-size:12px;">
  ※本シミュレーターはあくまで概算金額です。<br>
  ※実際の金額は現地調査後の正式見積にて確定します。<br>
  ※建物状況・下地状態・搬入条件等により金額は変動します。<br>
  ※足場費用は基本金額として計上していますが、建物形状により増減する場合があります。<br>
  ※処分費等は別途お見積りになります。<br>
　</p>
</div>

<style>
body{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#f5f7fb;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.option-grid{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.option-card{
  flex:1;
  min-width:90px;
  border:2px solid #ddd;
  border-radius:10px;
  text-align:center;
  padding:10px;
  cursor:pointer;
  background:#fff;
}

.option-card.active{
  background:#2196F3;
  color:#fff;
  border-color:#2196F3;
}

.option-icon{
  font-size:22px;
  display:block;
  margin-bottom:5px;
}

select,input{
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  padding:12px 15px;
  border:none;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
  margin:5px 5px 5px 0;
}

.btn-add{background:#4CAF50;color:#fff;}
.btn-calc{background:#2196F3;color:#fff;}
.btn-reset{background:#f44336;color:#fff;}

#result{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
  color:#2196F3;
}

#detail{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
}
</style>

<script>
let simCount = 0;

function numInput(id, ph=""){
  return `<input type="number" inputmode="numeric" min="0" placeholder="${ph}" id="${id}">`;
}

function addSim(){
  simCount++;

  let html = `
  <div class="card">
    <h4>工事${simCount}</h4>

    <div class="option-grid">
      <div class="option-card" onclick="cardSelect('main${simCount}','gaiso',this,changeMain,${simCount})">
        <span class="option-icon">🏠</span>外装リフォーム
      </div>
      <div class="option-card" onclick="cardSelect('main${simCount}','naisou',this,changeMain,${simCount})">
        <span class="option-icon">🛋</span>内装リフォーム
      </div>
    </div>

    <select id="main${simCount}" style="display:none;">
      <option value="">選択してください</option>
      <option value="gaiso">外装リフォーム</option>
      <option value="naisou">内装リフォーム</option>
    </select>

    <div id="content${simCount}"></div>
  </div>
  `;

  document.getElementById("simulators").insertAdjacentHTML("beforeend", html);
}

function resetAll(){
  simCount = 0;
  simulators.innerHTML = "";
  result.innerText = "";
  detail.innerHTML = "";
}

function changeMain(i){
  let val = document.getElementById("main"+i).value;
  let html = "";

  if(val === "gaiso"){
    html = `
    <div class="option-grid">

      <div class="option-card" onclick="cardSelect('gaisoType${i}','tosou',this,changeGaiso,${i})">
        <span class="option-icon">🫟</span>塗装
      </div>

      <div class="option-card" onclick="cardSelect('gaisoType${i}','yane',this,changeGaiso,${i})">
        <span class="option-icon">🏠</span>屋根
      </div>

      <div class="option-card" onclick="cardSelect('gaisoType${i}','gaiheki',this,changeGaiso,${i})">
        <span class="option-icon">🧱</span>外壁
      </div>

      <div class="option-card" onclick="cardSelect('gaisoType${i}','amadoi',this,changeGaiso,${i})">
        <span class="option-icon">💧</span>雨樋
      </div>

      <div class="option-card" onclick="cardSelect('gaisoType${i}','hafu',this,changeGaiso,${i})">
        <span class="option-icon">⚒️</span>破風板金・軒天・笠木板金
      </div>

    </div>

    <select id="gaisoType${i}" style="display:none;">
      <option value="">選択</option>
      <option value="tosou">塗装</option>
      <option value="yane">屋根</option>
      <option value="gaiheki">外壁</option>
      <option value="amadoi">雨樋</option>
      <option value="hafu">破風板金・軒天・笠木板金</option>
    </select>

    <div id="gaisoContent${i}"></div>
    `;
  }

  if(val === "naisou"){
    html = `
    壁紙（クロス）㎡ ${numInput("wall"+i,"例:100")}<br>
    床（畳）${numInput("floor"+i,"例:10")}<br>

    <div class="option-grid">
      <div class="option-card" onclick="cardSelect('floorType${i}','25000',this,null,${i})">フローリング</div>
      <div class="option-card" onclick="cardSelect('floorType${i}','8000',this,null,${i})">CF（クッションフロア）</div>
    </div>

    <select id="floorType${i}" style="display:none;">
      <option value="25000">フローリング</option>
      <option value="8000">CF（クッションフロア）</option>
    </select>
    `;
  }

  document.getElementById("content"+i).innerHTML = html;
}

function changeGaiso(i){
  let val = document.getElementById("gaisoType"+i).value;
  let html = "";

  if(val === "yane"){
    html = `
    屋根㎡ ${numInput("yaneM"+i,"例:120")}<br>

    既存屋根材

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('oldRoof${i}','kawara',this,null,${i})">瓦</div>
      <div class="option-card" onclick="cardSelect('oldRoof${i}','col',this,null,${i})">コロニアル<br>（カラーベスト）</div>
      <div class="option-card" onclick="cardSelect('oldRoof${i}','bankin',this,null,${i})">板金</div>
      <div class="option-card" onclick="cardSelect('oldRoof${i}','other',this,null,${i})">その他</div>

</div>

    <select id="oldRoof${i}" style="display:none;">
      <option value="kawara">瓦</option>
      <option value="col">コロニアル<br>（カラーベスト）</option>
      <option value="bankin">板金</option>
      <option value="other">その他</option>
    </select><br>

    工事

<div class="option-grid">

  <div class="option-card"
    onclick="cardSelect('kouji${i}','replace',this,changeRoofMaterial,${i})">
    葺き替え工事
  </div>

  <div class="option-card"
    onclick="cardSelect('kouji${i}','cover',this,changeRoofMaterial,${i})">
    カバー工事（既存屋根\n瓦\n施工不可）
  </div>

</div>

<select id="kouji${i}" style="display:none;">
  <option value="replace">葺き替え工事</option>
  <option value="cover">カバー工事<br>（既存屋根瓦施工不可）</option>
</select>

屋根材
<div id="yaneZaiWrap${i}"></div>
<select id="yaneZai${i}" style="display:none;"></select>
  
    `;
    setTimeout(()=>changeRoofMaterial(i),0);
  }

    if(val === "tosou"){
    html = `
    屋根㎡ ${numInput("yaneM"+i,"例:120")}<br>
    
    既存屋根材

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('oldRoof${i}','col',this,null,${i})">コロニアル<br>（カラーベスト）</div>
      <div class="option-card" onclick="cardSelect('oldRoof${i}','bankin',this,null,${i})">板金</div>
      <div class="option-card" onclick="cardSelect('oldRoof${i}','other',this,null,${i})">その他</div>
</div>

  <select id="oldRoof${i}" style="display:none;">
    <option value="col">コロニアル<br>（カラーベスト）</option>
    <option value="bankin">板金</option>
    <option value="other">その他</option>
  </select><br>

    屋根塗料

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('yanePaint${i}','3000',this,null,${i})">シリコン塗料</div>
      <div class="option-card" onclick="cardSelect('yanePaint${i}','5000',this,null,${i})">フッ素塗料</div>
      <div class="option-card" onclick="cardSelect('yanePaint${i}','7000',this,null,${i})">無機質塗料</div>
</div>

    <select id="yanePaint${i}" style="display:none;">
      <option value="3000">シリコン塗料</option>
      <option value="5000">フッ素塗料</option>
      <option value="7000">無機質塗料</option>
    </select><br>


    外壁㎡ ${numInput("kabeM"+i,"例:150")}<br>

    既存外壁材

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','moltal',this,null,${i})">モルタル<br>（塗り壁）</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','yougyo',this,null,${i})">窯業系サイディング</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','metal',this,null,${i})">金属系サイディング</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','other',this,null,${i})">その他</div>

</div>

  <select id="oldgaiheki${i}" style="display:none;">
    <option value="moltal">モルタル<br>（塗り壁）</option>
    <option value="yougyo">窯業系サイディング</option>
    <option value="metal">金属系サイディング</option>
    <option value="other">その他</option>
  </select><br>

    外壁塗料
<div class="option-grid">
      <div class="option-card" onclick="cardSelect('kabePaint${i}','3000',this,null,${i})">シリコン塗料</div>
      <div class="option-card" onclick="cardSelect('kabePaint${i}','5000',this,null,${i})">フッ素塗料</div>
      <div class="option-card" onclick="cardSelect('kabePaint${i}','7000',this,null,${i})">無機質塗料</div>
</div>

    <select id="kabePaint${i}" style="display:none;">
      <option value="3000">シリコン塗料</option>
      <option value="5000">フッ素塗料</option>
      <option value="7000">無機質塗料</option>
    </select>
    `;
  }

  
  if(val === "gaiheki"){
    html = `
    外壁㎡ ${numInput("kabeM"+i,"例:150")}<br>

    既存外壁材

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','moltal',this,null,${i})">モルタル<br>（塗り壁）</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','yougyo',this,null,${i})">窯業系サイディング</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','metal',this,null,${i})">金属系サイディング</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','tail',this,null,${i})">タイル</div>
      <div class="option-card" onclick="cardSelect('oldgaiheki${i}','other',this,null,${i})">その他</div>
</div>

  <select id="oldgaiheki${i}" style="display:none;">
    <option value="moltal">モルタル<br>（塗り壁）</option>
    <option value="yougyo">窯業系サイディング</option>
    <option value="metal">金属系サイディング</option>
    <option value="tail">タイル</option>
    <option value="other">その他</option>
  </select><br>

    工事

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('gaihekiKouji${i}','replace',this,null,${i})">張り替え工事</div>
      <div class="option-card" onclick="cardSelect('gaihekiKouji${i}','cover',this,null,${i})">カバー工事<br>（既存モルタル・タイル不可）</div>
</div>

    <select id="gaihekiKouji${i}" style="display:none;">
      <option value="replace">張り替え工事</option>
      <option value="cover">カバー工事<br>（既存モルタル・タイル不可）</option>
    </select><br>

    外壁材

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('gaihekiZai${i}','yougyo',this,null,${i})">窯業系サイディング</div>
      <div class="option-card" onclick="cardSelect('gaihekiZai${i}','metal',this,null,${i})">金属系サイディング</div>
</div>

    <select id="gaihekiZai${i}" style="display:none;">
      <option value="yougyo">窯業系サイディング</option>
      <option value="metal">金属系サイディング</option>
    </select>
    `;
  }

  if(val === "amadoi"){
    html = `
    軒樋m ${numInput("nokim"+i,"例:30")}<br>
    竪樋m ${numInput("tatem"+i,"例:20")}<br>
    集水箇所 ${numInput("syusui"+i,"例:4")}<br>

    軒樋

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('nokiType${i}','3300',this,null,${i})">半月</div>
      <div class="option-card" onclick="cardSelect('nokiType${i}','3500',this,null,${i})">角樋</div>
</div>

    <select id="nokiType${i}" style="display:none;">
      <option value="3300">半月</option>
      <option value="3500">角樋</option>
    </select><br>

    竪樋

<div class="option-grid">
      <div class="option-card" onclick="cardSelect('tateType${i}','3000',this,null,${i})">丸形</div>
      <div class="option-card" onclick="cardSelect('tateType${i}','3400',this,null,${i})">四角形</div>
</div>

    <select id="tateType${i}" style="display:none;">
      <option value="3000">丸形</option>
      <option value="3400">四角形</option>
    </select>
    `;
  }

  if(val === "hafu"){
    html = `
    破風板（鼻隠し）m ${numInput("hafuM"+i,"例:25")}<br>
    軒天㎡ ${numInput("nokiten"+i,"例:40")}<br>
    笠木m ${numInput("kasagi"+i,"例:10")}<br>
    `;
  }

  document.getElementById("gaisoContent"+i).innerHTML = html;
}

function cardSelect(id,value,el,callback,i){
  let select=document.getElementById(id);
  select.value=value;

  let cards=el.parentNode.querySelectorAll(".option-card");
  cards.forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  if(callback) callback(i);
}

function changeRoofMaterial(i){
  let kouji = document.getElementById("kouji"+i).value;
  let select = document.getElementById("yaneZai"+i);
  let wrap = document.getElementById("yaneZaiWrap"+i);

  let list = kouji === "cover"
  ? [
    ["14500","ディプロマットスター<br>（砂付き板金）"],
    ["14000","スーパーガルテクト<br>（断熱材付き板金）"],
    ["11500","タフワイド220<br>（横葺き板金）"],
    ["9500","オークリッジスーパー<br>（アスファルトシングル）"]
  ]
  : [
    ["17600","ディプロマットスター<br>（砂付き板金）"],
    ["17100","スーパーガルテクト<br>（断熱材付き板金）"],
    ["14600","タフワイド220<br>（横葺き板金）"],
    ["12600","オークリッジスーパー<br>（アスファルトシングル）"],
    ["14600","タフビーム455<br>（瓦棒板金）"],
    ["10800","コロニアル<br>（カラーベスト）"]
  ];

  select.innerHTML = list.map(v => `<option value="${v[0]}">${v[1]}</option>`).join("");

  wrap.innerHTML = `
    <div class="option-grid">
      ${list.map(v=>`
        <div class="option-card"
          onclick="cardSelect('yaneZai${i}','${v[0]}',this,null,${i})">
          ${v[1]}
        </div>
      `).join("")}
    </div>
  `;
}

function calc(){
  let total = 0;
  let detail = "";
  let hasGaiso = false;

  for(let i=1;i<=simCount;i++){

    let main = get("main"+i);

    if(main === "gaiso"){
      hasGaiso = true;
      let type = get("gaisoType"+i);

      if(type === "yane"){
        let p = val("yaneM"+i)*val("yaneZai"+i);
        total += p;
        detail += `工事${i} 屋根：${p.toLocaleString()}円<br>`;
      }

      if(type === "tosou"){
        let y = val("yaneM"+i)*val("yanePaint"+i);
        let k = val("kabeM"+i)*val("kabePaint"+i);
        total += y+k;
        detail += `工事${i} 屋根塗装：${y.toLocaleString()}円<br>`;
        detail += `工事${i} 外壁塗装：${k.toLocaleString()}円<br>`;
      }

      if(type === "gaiheki"){
        let m = val("kabeM"+i);
        let kouji = get("gaihekiKouji"+i);
        let zai = get("gaihekiZai"+i);

        let price = (zai==="yougyo")
          ? m*(kouji==="replace"?16000:12000)
          : m*(kouji==="replace"?18000:14000);

        total += price;
        detail += `工事${i} 外壁：${price.toLocaleString()}円<br>`;
      }

      if(type === "amadoi"){
        let n = val("nokim"+i)*val("nokiType"+i);
        let t = val("tatem"+i)*val("tateType"+i);
        let s = val("syusui"+i)*3700;

        total += n+t+s;

        detail += `工事${i} 軒樋：${n.toLocaleString()}円<br>`;
        detail += `工事${i} 竪樋：${t.toLocaleString()}円<br>`;
        detail += `工事${i} 集水箇所：${s.toLocaleString()}円<br>`;
      }

      if(type === "hafu"){
        let h = val("hafuM"+i)*8000;
        let n = val("nokiten"+i)*13000;
        let k = val("kasagi"+i)*8000;

        total += h+n+k;

        detail += `工事${i} 破風板金：${h.toLocaleString()}円<br>`;
        detail += `工事${i} 軒天：${n.toLocaleString()}円<br>`;
        detail += `工事${i} 笠木板金：${k.toLocaleString()}円<br>`;
      }
    }

    if(main === "naisou"){
      let w = val("wall"+i)*1800;
      let f = val("floor"+i)*val("floorType"+i);

      total += w+f;

      detail += `工事${i} 壁紙（クロス）：${w.toLocaleString()}円<br>`;
      detail += `工事${i} 床：${f.toLocaleString()}円<br>`;
    }
  }

  if(hasGaiso){
    total += 200000;
    detail += `<br>足場代：200,000円<br>`;
  }

  document.getElementById("result").innerText =
    "合計金額：" + total.toLocaleString() + "円";
  
  document.getElementById("detail").innerHTML =
    "<h4>内訳</h4>" + detail;
}

function val(id){
  let el = document.getElementById(id);
  return el ? Number(el.value) : 0;
}

function get(id){
  let el = document.getElementById(id);
  return el ? el.value : "";
}

addSim();

</script>
